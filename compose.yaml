services:
  db:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-api_monitoring}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change-me}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-api_monitoring}
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    ports:
      - ${BACKEND_PORT:-8000}:8000
    volumes:
      - ./apps/backend:/app
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    env_file:
      - ./apps/web/.env.local
    ports:
      - ${FRONTEND_PORT:-3000}:3000
    volumes:
      - ./apps/web:/app
      - frontend_node_modules:/app/node_modules

  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
    command:
      - celery
      - -A
      - app.celery_app:celery_app
      - worker
      - --loglevel=info

  scheduler:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
      - scheduler_data:/tmp/celery
    command:
      - celery
      - -A
      - app.celery_app:celery_app
      - beat
      - --loglevel=info
      - --schedule
      - /tmp/celery/celerybeat-schedule

volumes:
  postgres_data:
  frontend_node_modules:
  scheduler_data:
