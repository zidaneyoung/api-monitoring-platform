services:
  db:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-api_monitoring}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change-me}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-api_monitoring}
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
      - ${MAILPIT_UI_PORT:-8025}:8025

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    ports:
      - ${BACKEND_PORT:-8000}:8000
    volumes:
      - ./apps/backend:/app
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./apps/web/.env.local
    environment:
      INTERNAL_API_BASE_URL: http://backend:8000
    ports:
      - ${FRONTEND_PORT:-3000}:3000
    volumes:
      - ./apps/web:/app
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/health',{signal:AbortSignal.timeout(2000)}).then(response=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
    command:
      - celery
      - -A
      - app.celery_app:celery_app
      - worker
      - --loglevel=info

  email-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    env_file:
      - ./apps/backend/.env
    environment:
      EMAIL_HOST: ${EMAIL_HOST:-mailpit}
      EMAIL_PORT: ${EMAIL_PORT:-1025}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@api-monitoring.local}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
      EMAIL_TIMEOUT_SECONDS: ${EMAIL_TIMEOUT_SECONDS:-10}
    volumes:
      - ./apps/backend:/app
    command:
      - celery
      - -A
      - app.celery_app:celery_app
      - worker
      - --loglevel=info
      - --queues=email

  scheduler:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
      - scheduler_data:/tmp/celery
    command:
      - celery
      - -A
      - app.celery_app:celery_app
      - beat
      - --loglevel=info
      - --schedule
      - /tmp/celery/celerybeat-schedule

volumes:
  postgres_data:
  frontend_node_modules:
  scheduler_data:
