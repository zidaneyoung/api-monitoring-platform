name: api-monitoring-integration-tests

services:
  db:
    image: postgres:16.4-alpine
    restart: "no"
    environment:
      POSTGRES_DB: api_monitoring_integration
      POSTGRES_USER: integration_test
      POSTGRES_PASSWORD: integration-only
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U integration_test -d api_monitoring_integration
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 3s
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    restart: "no"
    healthcheck:
      test: [CMD, redis-cli, -n, "15", ping]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 2s

  mailpit:
    image: axllent/mailpit:v1.27
    restart: "no"
    healthcheck:
      test: [CMD, /mailpit, readyz]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 2s

  tests:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.test
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment:
      ENVIRONMENT: test
      DEBUG: "false"
      FRONTEND_ORIGIN: http://frontend.test
      SECRET_KEY: integration-only-secret
      AUTH_RATE_LIMIT_KEY_SECRET: integration-only-rate-limit-secret
      AUTH_ALLOW_MISSING_ORIGIN: "true"
      DATABASE_URL: postgresql+asyncpg://integration_test:integration-only@db:5432/application_database_unused
      TEST_DATABASE_URL: postgresql+asyncpg://integration_test:integration-only@db:5432/api_monitoring_integration
      REDIS_URL: redis://redis:6379/14
      TEST_REDIS_URL: redis://redis:6379/15
      CELERY_BROKER_URL: redis://redis:6379/15
      CELERY_RESULT_BACKEND: redis://redis:6379/15
      TEST_SMTP_HOST: mailpit
      TEST_SMTP_PORT: "1025"
      TEST_MAILPIT_API_URL: http://mailpit:8025
      PYTEST_ARGS: ${PYTEST_ARGS:-}
      EMAIL_HOST: mailpit
      EMAIL_PORT: "1025"
      EMAIL_FROM: no-reply@integration.test
      EMAIL_USE_TLS: "false"
    command:
      - /bin/sh
      - -c
      - >-
        DATABASE_URL="$$TEST_DATABASE_URL" alembic upgrade head &&
        python -m scripts.prepare_integration_tests &&
        python -m pytest -q $${PYTEST_ARGS:-}
